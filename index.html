<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Aldea Consuelo de Rodríguez</title>
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="fontawesome/css/all.min.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="container">
            <h2 class="text-center">Aldea Consuelo de Rodríguez <i class="fas fa-university"></i></h2>
            <p style="text-align:center; color:#666; margin-bottom:20px;">Control de Matrícula de Triunfadores</p>
            
       

            <form method="POST" action="">
                <div class="form-group">
                    <label for="usuario">USUARIO</label>
                    <input type="text" name="usuario" id="usuario" required placeholder="Ingrese su usuario">
                </div>
                <div class="form-group">
                    <label for="password">CONTRASEÑA</label>
                    <input type="password" name="password" id="password" required placeholder="Ingrese su contraseña">
                </div>
                <div class="form-group login-button-group">
                    <button type="submit" style="width:100%;">Ingresar <i class="fas fa-sign-in-alt"></i></button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
